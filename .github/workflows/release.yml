name: Release

# Changesets-driven release on every push to `main`.
#
# Flow:
#   1. While developing, run `pnpm changeset` and commit the generated
#      `.changeset/*.md` file describing the bump (patch/minor/major) + summary.
#   2. Merge that work to `main`. This workflow opens/updates a
#      "chore(release): version packages" PR that bumps versions + writes
#      CHANGELOGs (the 4 public @manti-ui/* packages move together — see
#      `fixed` in .changeset/config.json).
#   3. Merge that PR. This workflow then builds, publishes to npm, and cuts a
#      single `vX.Y.Z` GitHub Release.
#
# Prerequisites:
#   - `NPM_TOKEN` repo secret: an npm *Automation* token with publish rights to
#     the @manti-ui scope (Automation bypasses the account's 2FA OTP).
#   - Settings -> Actions -> General -> "Allow GitHub Actions to create and
#     approve pull requests" must be ON, so the action can open the version PR.

on:
  push:
    branches:
      - main

# Never run two releases at once; don't cancel an in-flight one.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write # version commit, tags, GitHub Release
  pull-requests: write # open/update the "version packages" PR
  id-token: write # npm provenance, if enabled later

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so release notes can diff against the last tag

      - name: Setup pnpm
        uses: pnpm/action-setup@v4 # version comes from package.json "packageManager"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # When changesets exist -> opens/updates the version PR (runs `version`).
      # When none exist but versions are ahead of npm -> publishes (runs `publish`).
      - name: Create version PR or publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm run version-packages
          publish: pnpm run release
          commit: 'chore(release): version packages'
          title: 'chore(release): version packages'
          createGithubReleases: false # we cut one combined vX.Y.Z release below
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Packages version in lockstep (fixed), so one tag/release covers them all.
      - name: Tag and create GitHub Release
        if: steps.changesets.outputs.published == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="v$(node -p "require('./packages/react/package.json').version")"
          if gh release view "$VERSION" >/dev/null 2>&1; then
            echo "Release $VERSION already exists, skipping."
            exit 0
          fi
          git tag -a "$VERSION" -m "$VERSION"
          git push origin "$VERSION"
          gh release create "$VERSION" --verify-tag --generate-notes
