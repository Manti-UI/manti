<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/manti-favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manti UI — a framework-agnostic design system on Zag.js</title>
    <meta
      name="description"
      content="Manti UI is a framework-agnostic design system built on Zag.js behavior machines: sleek monochrome panels, semantic tones, and a token-first customization contract."
    />
    <script>
      // No-flash theme init — must run before first paint. Mirrors the Manti
      // theme mechanism used in .storybook/preview.tsx (data-theme on <html>).
      (function () {
        try {
          var stored = localStorage.getItem('manti-theme');
          var prefersDark =
            window.matchMedia &&
            window.matchMedia('(prefers-color-scheme: dark)').matches;
          document.documentElement.dataset.theme =
            stored || (prefersDark ? 'dark' : 'light');
        } catch (e) {
          /* keep the markup default */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
